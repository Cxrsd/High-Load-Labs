services:
  app1:
    build: .
    environment:
      - INSTANCE_ID=app-1
      - PORT=8080
    ports:
      - "8001:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3

  app2:
    build: .
    environment:
      - INSTANCE_ID=app-2
      - PORT=8080
    ports:
      - "8002:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3

  app3:
    build: .
    environment:
      - INSTANCE_ID=app-3
      - PORT=8080
    ports:
      - "8003:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
